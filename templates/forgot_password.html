<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% include 'navbar.html' %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
    <div class="card shadow p-4" style="width:400px;">

        <h3 class="text-center text-primary mb-3">
            Reset Password
        </h3>

        {% if message %}
            <div class="alert alert-info">{{ message }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" class="form-control mb-3" placeholder="Enter Username" required>

            <input type="password" name="password" class="form-control mb-3" placeholder="New Password" required>

            <button class="btn btn-primary w-100">
                Reset Password
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="/login/">Back to Login</a>
        </div>

    </div>
</div>

{% include 'footer.html' %}

</body>
</html>
