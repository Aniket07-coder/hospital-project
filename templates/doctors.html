<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        .search-box {
            max-width: 500px;
            margin: auto;
        }
    </style>
</head>

<body>

{% include 'navbar.html' %}

<!-- 🔷 HEADER -->
<div class="bg-dark text-white text-center p-4">
    <h1>👨‍⚕️ Our Doctors</h1>
    <p>Meet our professional specialists</p>
</div>

<!-- 🔍 SEARCH -->
<div class="container mt-4">
    <form method="GET" class="search-box text-center">
        <div class="input-group">
            <input type="text" name="q" placeholder="Search doctor..." class="form-control">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>
</div>

<!-- 👨‍⚕️ DOCTORS LIST -->
<div class="container mt-5">
    <div class="row">

        {% for doctor in doctors %}
        <div class="col-md-4">
            <div class="card shadow mb-4">

                {% if doctor.image %}
                <img src="{{ doctor.image.url }}" class="card-img-top" height="270">
                {% else %}
                <img src="https://via.placeholder.com/300x220" class="card-img-top">
                {% endif %}

                <div class="card-body text-center">
                    <h5 class="card-title">{{ doctor.name }}</h5>
                    <p class="text-muted">{{ doctor.specialization }}</p>

                    <a href="/appointment/" class="btn btn-success btn-sm">Book Appointment</a>
                </div>
            </div>
        </div>
        {% empty %}
        <h4 class="text-center text-danger">No doctors found</h4>
        {% endfor %}

    </div>
</div>

{% include 'footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
