<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background: linear-gradient(180deg, #343a40, #212529);
            padding-top: 20px;
        }

        .sidebar h4 {
            color: #fff;
            font-weight: bold;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccc;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #495057;
            color: #fff;
            padding-left: 25px;
        }

        .sidebar a.active {
            background: #0d6efd;
            color: #fff;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .topbar {
            background: #fff;
            padding: 12px 20px;
            border-bottom: 1px solid #ddd;
            border-radius: 10px;
        }

        .logout-btn {
            margin: 20px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4 class="text-center mb-4">👑 Admin</h4>

    <a href="/dashboard/" 
   class="{% if request.path == '/dashboard/' %}active{% endif %}">
    <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    
    <a href="/admin-appointments/" 
       class="{% if request.path == '/admin-appointments/' %}active{% endif %}">
        <i class="bi bi-calendar-check"></i> Appointments
    </a>
    
    <a href="/admin-doctors/" 
       class="{% if request.path == '/admin-doctors/' %}active{% endif %}">
        <i class="bi bi-person-badge"></i> Doctors
    </a>
    
    <a href="/admin-users/" 
       class="{% if request.path == '/admin-users/' %}active{% endif %}">
        <i class="bi bi-people"></i> Users
    </a>
    
    <a href="/admin-messages/" 
       class="{% if request.path == '/admin-messages/' %}active{% endif %}">
        <i class="bi bi-envelope"></i> Messages
    </a>

    <hr class="text-light">

    <!-- Logout -->
    <form method="POST" action="{% url 'logout' %}" class="logout-btn text-center">
        {% csrf_token %}
        <button class="btn btn-danger w-75">
            <i class="bi bi-box-arrow-right"></i> Logout
        </button>
    </form>

</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between align-items-center mb-4 shadow-sm">
        <h5 class="mb-0">Welcome, {{ user.username }}</h5>
        <span class="badge bg-primary">Admin Panel</span>
    </div>

    {% block content %}{% endblock %}

</div>

</body>
</html>
