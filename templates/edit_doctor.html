<!DOCTYPE html>
<html>
<head>
    <title>Edit Doctor</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-5">

    <div class="card shadow p-4" style="max-width:500px; margin:auto;">
        <h3 class="text-center mb-4">✏ Edit Doctor</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Name -->
            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" value="{{ doctor.name }}" class="form-control" required>
            </div>

            <!-- Specialization -->
            <div class="mb-3">
                <label>Specialization</label>
                <select name="specialization" class="form-control mb-3">
                    <option {% if doctor.specialization == "Cardiologist" %}selected{% endif %}>Cardiologist</option>
                    <option {% if doctor.specialization == "Dermatologist" %}selected{% endif %}>Dermatologist</option>
                    <option {% if doctor.specialization == "Neurologist" %}selected{% endif %}>Neurologist</option>
                    <option {% if doctor.specialization == "Pediatrician" %}selected{% endif %}>Pediatrician</option>
                    <option {% if doctor.specialization == "Orthopedic" %}selected{% endif %}>Orthopedic</option>
                    <option {% if doctor.specialization == "Dentist" %}selected{% endif %}>Dentist</option>
                    <option {% if doctor.specialization == "Gynecologist" %}selected{% endif %}>Gynecologist</option>
                    <option {% if doctor.specialization == "General Physician" %}selected{% endif %}>General Physician</option>
                </select>
            </div>

            <!-- Image -->
            <div class="mb-3">
                <label>Update Image</label>
                <input type="file" name="image" class="form-control">
            </div>

            <!-- Button -->
            <button class="btn btn-warning w-100">Update Doctor</button>

            <div class="mt-3 text-center">
                <a href="/dashboard/" class="btn btn-secondary w-100">
                    Cancel
                </a>
            </div>
        </form>

    </div>

</div>

{% include 'footer.html' %}

</body>
</html>
