<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .form-card {
            max-width: 500px;
            margin: auto;
            margin-top: 80px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

{% include 'navbar.html' %}

<div class="container">

    <div class="card form-card shadow p-4">
        <h3 class="text-center mb-4">➕ Add Doctor</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Name -->
            <div class="mb-3">
                <label>Doctor Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter doctor name" required>
            </div>

            <!-- Specialization -->
            <div class="mb-3">
                <label>Specialization</label>
                <select name="specialization" class="form-control mb-3">
                    <option value="">Select Specialization</option>
                    <option>Cardiologist</option>
                    <option>Dermatologist</option>
                    <option>Neurologist</option>
                    <option>Pediatrician</option>
                    <option>Orthopedic</option>
                    <option>Dentist</option>
                    <option>Gynecologist</option>
                    <option>General Physician</option>
                </select>
            </div>

            <!-- Image -->
            <div class="mb-3">
                <label>Doctor Image</label>
                <input type="file" name="image" class="form-control">
            </div>

            <!-- Button -->
            <button class="btn btn-success w-100">Save Doctor</button>
        </form>

    </div>

</div>

{% include 'footer.html' %}

</body>
</html>
