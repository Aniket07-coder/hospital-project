<!DOCTYPE html>
<html>
<head>
    <title>Appointment</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">Book Appointment</h3>

        <form method="POST">
            {% csrf_token %}

            <input type="text" value="{{ user.username }}" class="form-control mb-3" readonly>
            <input type="email" value="{{ user.email }}" class="form-control mb-3" readonly>

            <select name="doctor" class="form-control mb-3">
                {% for doctor in doctors %}
                <option value="{{ doctor.id }}">{{ doctor.name }}</option>
                {% endfor %}
            </select>

            <input type="date" name="date" class="form-control mb-3">
            <input type="time" name="time" class="form-control mb-3">

            <button class="btn btn-success w-100">Book</button>
        </form>
    </div>
</div>

{% include 'footer.html' %}

</body>
</html>
